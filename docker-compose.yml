services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurante-db
    environment:
      POSTGRES_DB: restaurante
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: restaurante-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/restaurante
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      - postgres

volumes:
  postgres_data: